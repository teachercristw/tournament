<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Tournament: Name Race</title>
    
    <!-- CDNs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF5722;
            --secondary: #2196F3;
            --success: #4CAF50;
            --danger: #F44336;
            --accent: #FFC107;
            --bg: #F0F4F8;
            --text: #2C3E50;
        }

        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Fredoka One', 'Century Gothic', 'AppleGothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            font-weight: bold;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0;
        }
        .active { display: flex; }

        /* UI Elements */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px #1565C0;
            transition: 0.1s;
            margin: 10px;
            min-width: 200px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px #1565C0; }
        .btn-orange { background: var(--primary); box-shadow: 0 8px #BF360C; }
        .btn-green { background: var(--success); box-shadow: 0 8px #1B5E20; }

        input[type="text"] {
            font-size: 2rem;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid var(--secondary);
            text-align: center;
            width: 80%;
            max-width: 400px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        /* Lobby & Bracket */
        .lobby-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            width: 90%;
            max-height: 50vh;
            overflow-y: auto;
            background: white;
            padding: 20px;
            border-radius: 25px;
            border: 5px dashed var(--secondary);
        }
        .player-tag {
            background: var(--accent);
            padding: 10px;
            border-radius: 15px;
            font-size: 1rem;
            color: white;
            animation: pop 0.3s ease;
        }

        .tournament-grid {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            padding: 20px;
        }
        .match-card {
            background: white;
            border: 4px solid #ddd;
            border-radius: 15px;
            padding: 10px;
            width: 180px;
            margin-bottom: 10px;
        }
        .match-active { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .slot {
            padding: 8px;
            margin: 4px;
            background: #f1f1f1;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .slot.winner { background: var(--success) !important; color: white; }

        /* Game Elements */
        #letter-sea {
            position: relative;
            width: 90vw; height: 40vh;
            background: rgba(255,255,255,0.6);
            border-radius: 30px;
            border: 4px solid var(--secondary);
            overflow: hidden;
            margin-top: 20px;
        }
        .bubble {
            position: absolute;
            width: 70px; height: 70px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white;
            box-shadow: 0 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        #gear { position: fixed; top: 10px; right: 10px; font-size: 30px; cursor: pointer; z-index: 1000; opacity: 0.3; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="gear" onclick="toggleDash()">⚙️</div>

    <div id="game-container">
        <!-- 1. Start/Entry -->
        <div id="screen-start" class="screen active">
            <h1 style="font-size: 4rem; color: var(--primary);">NAME RACE</h1>
            <button class="btn btn-green" onclick="setRole('host')">TEACHER (Smartboard)</button>
            <button class="btn btn-orange" onclick="setRole('player')">STUDENT (iPad)</button>
        </div>

        <!-- 2. Student Name Entry -->
        <div id="screen-name-entry" class="screen">
            <h2>Enter Your Name</h2>
            <input type="text" id="student-name-input" placeholder="e.g. Alex" maxlength="12">
            <button class="btn btn-green" onclick="joinLobby()">JOIN GAME</button>
        </div>

        <!-- 3. Host Lobby -->
        <div id="screen-host-lobby" class="screen">
            <h1 id="lobby-count">Waiting for Students (0/30)</h1>
            <div class="lobby-list" id="lobby-display"></div>
            <button class="btn btn-green" id="start-tourney-btn" style="display:none;" onclick="startTournament()">START TOURNAMENT</button>
        </div>

        <!-- 4. Tournament Bracket (Host) -->
        <div id="screen-host-bracket" class="screen">
            <h2 id="round-label">Tournament Bracket</h2>
            <div class="tournament-grid" id="bracket-display"></div>
            <button class="btn btn-orange" onclick="nextWord()">START NEXT RACE</button>
            <button class="btn" onclick="resetAll()">RESET GAME</button>
        </div>

        <!-- 5. Student Play -->
        <div id="screen-play" class="screen">
            <h2 id="game-prompt">Spell the Word!</h2>
            <div id="word-slots" style="display:flex; gap:10px; margin-bottom:20px;"></div>
            <div id="letter-sea"></div>
        </div>

        <!-- 6. Student Wait -->
        <div id="screen-wait" class="screen">
            <h1 id="wait-status">Joined!</h1>
            <p>Wait for the teacher to start the race.</p>
        </div>
    </div>

    <!-- Dash -->
    <div class="overlay" id="overlay" onclick="toggleDash()"></div>
    <div id="dash-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:30px; border-radius:30px; z-index:1001; width:80%;">
        <h3>Settings</h3>
        <textarea id="vocab-input" style="width:100%; height:100px;">APPLE, BANANA, CHERRY, DRAGON, EAGLE, FLOWER, GARDEN</textarea>
        <button class="btn" onclick="saveDash()">SAVE</button>
    </div>

    <script>
        // --- 1. CONFIG & STATE ---
        const fbConfig = {
            apiKey: "AIzaSyAeW720p-jxvUKu4wGjltbV-7PzXXH2Lv8",
            authDomain: "tournament-64337.firebaseapp.com",
            databaseURL: "https://tournament-64337-default-rtdb.firebaseio.com",
            projectId: "tournament-64337",
            storageBucket: "tournament-64337.firebasestorage.app",
            messagingSenderId: "1001808716448",
            appId: "1:1001808716448:web:d2c23c00b78faebd329fc5"
        };

        let db, role, myName;
        let localState = { players: {}, status: 'lobby', matches: [], currentWord: "" };
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(f, d) {
            const o = audio.createOscillator();
            const g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
            o.start(); o.stop(audio.currentTime + d);
        }

        // --- 2. CORE LOGIC ---
        function setRole(r) {
            role = r;
            if (!firebase.apps.length) firebase.initializeApp(fbConfig);
            db = firebase.database();
            
            db.ref('name_race_game').on('value', (snap) => {
                const val = snap.val();
                if (val) {
                    localState = val;
                    syncUI();
                }
            });

            if (role === 'player') navigate('screen-name-entry');
            else navigate('screen-host-lobby');
        }

        function joinLobby() {
            const input = document.getElementById('student-name-input');
            myName = input.value.trim();
            if (!myName) return alert("Enter your name!");
            
            const pKey = db.ref('name_race_game/players').push().key;
            db.ref('name_race_game/players/' + pKey).set({ name: myName, id: pKey });
            navigate('screen-wait');
        }

        function startTournament() {
            const playerArray = Object.values(localState.players || {});
            if (playerArray.length < 2) return alert("Need at least 2 players!");
            
            // Fisher-Yates Shuffle
            for (let i = playerArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [playerArray[i], playerArray[j]] = [playerArray[j], playerArray[i]];
            }

            // Build Bracket Matches
            const matches = [];
            for (let i = 0; i < playerArray.length; i += 2) {
                matches.push({
                    p1: playerArray[i],
                    p2: playerArray[i+1] || { name: "BYE", id: "bye" },
                    winner: (playerArray[i+1] ? null : playerArray[i].id)
                });
            }

            db.ref('name_race_game').update({
                status: 'bracket',
                matches: matches,
                round: 1
            });
        }

        function nextWord() {
            const v = localState.vocab || ["APPLE", "BANANA"];
            const word = v[Math.floor(Math.random() * v.length)];
            db.ref('name_race_game').update({ status: 'playing', currentWord: word });
        }

        // --- 3. UI SYNCING ---
        function syncUI() {
            if (role === 'host') {
                if (localState.status === 'lobby') {
                    renderLobby();
                } else {
                    renderBracket();
                    navigate('screen-host-bracket');
                }
            } else {
                if (localState.status === 'playing') {
                    const myMatch = localState.matches.find(m => (m.p1.id === myNameId() || m.p2.id === myNameId()) && !m.winner);
                    if (myMatch) {
                        startMiniGame();
                        navigate('screen-play');
                    } else {
                        updateStudentWait();
                        navigate('screen-wait');
                    }
                } else if (localState.status === 'bracket') {
                    updateStudentWait();
                    navigate('screen-wait');
                }
            }
        }

        function myNameId() {
            return Object.values(localState.players || {}).find(p => p.name === myName)?.id;
        }

        function renderLobby() {
            const list = document.getElementById('lobby-display');
            const players = Object.values(localState.players || {});
            list.innerHTML = '';
            players.forEach(p => {
                const el = document.createElement('div');
                el.className = 'player-tag';
                el.innerText = p.name;
                list.appendChild(el);
            });
            document.getElementById('lobby-count').innerText = `Students Joined: ${players.length}/30`;
            document.getElementById('start-tourney-btn').style.display = players.length >= 2 ? 'block' : 'none';
        }

        function renderBracket() {
            const display = document.getElementById('bracket-display');
            display.innerHTML = '';
            localState.matches.forEach(m => {
                const div = document.createElement('div');
                div.className = `match-card ${localState.status==='playing' && !m.winner ? 'match-active' : ''}`;
                div.innerHTML = `
                    <div class="slot ${m.winner === m.p1.id ? 'winner' : ''}">${m.p1.name}</div>
                    <div class="slot ${m.winner === m.p2.id ? 'winner' : ''}">${m.p2.name}</div>
                `;
                display.appendChild(div);
            });
        }

        function updateStudentWait() {
            const statusText = document.getElementById('wait-status');
            const myId = myNameId();
            const match = localState.matches.find(m => m.p1.id === myId || m.p2.id === myId);
            
            if (!match) {
                statusText.innerText = "Waiting for Round...";
            } else if (match.winner) {
                statusText.innerText = match.winner === myId ? "YOU WON! 🏆" : "Round Over";
            } else {
                statusText.innerText = "Get Ready to Race!";
            }
        }

        // --- 4. GAMEPLAY ---
        function startMiniGame() {
            const word = localState.currentWord;
            const slots = document.getElementById('word-slots');
            const sea = document.getElementById('letter-sea');
            slots.innerHTML = ''; sea.innerHTML = '';
            let progress = 0;

            word.split('').forEach(() => {
                const s = document.createElement('div');
                s.style = "width:50px; height:50px; border:3px solid #ccc; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:white;";
                slots.appendChild(s);
            });

            const chars = (word + "XYZ").split('').sort(() => Math.random() - 0.5);
            chars.forEach(c => {
                const b = document.createElement('div');
                b.className = 'bubble';
                b.innerText = c;
                b.style.left = Math.random() * 80 + '%';
                b.style.top = Math.random() * 80 + '%';
                b.onclick = () => {
                    if (c === word[progress]) {
                        playTone(400 + (progress*100), 0.1);
                        slots.children[progress].innerText = c;
                        b.remove();
                        progress++;
                        if (progress === word.length) submitWin();
                    } else {
                        playTone(150, 0.2);
                        b.style.background = "var(--danger)";
                        setTimeout(() => b.style.background = "var(--accent)", 400);
                    }
                };
                sea.appendChild(b);
            });
        }

        function submitWin() {
            playTone(800, 0.4);
            const myId = myNameId();
            const mIdx = localState.matches.findIndex(m => (m.p1.id === myId || m.p2.id === myId) && !m.winner);
            if (mIdx !== -1) {
                db.ref(`name_race_game/matches/${mIdx}/winner`).set(myId);
                db.ref(`name_race_game/status`).set('bracket');
            }
        }

        // --- 5. HELPERS ---
        function navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleDash() {
            const d = document.getElementById('dash-modal');
            const o = document.getElementById('overlay');
            const s = d.style.display === 'none';
            d.style.display = s ? 'block' : 'none';
            o.style.display = s ? 'block' : 'none';
        }

        function saveDash() {
            const v = document.getElementById('vocab-input').value.split(',').map(x => x.trim().toUpperCase());
            db.ref('name_race_game/vocab').set(v);
            toggleDash();
        }

        function resetAll() {
            db.ref('name_race_game').set(null);
            location.reload();
        }
    </script>
</body>
</html>
