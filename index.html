<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Tournament: Name Race</title>
    
    <!-- CDNs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF5722;
            --secondary: #2196F3;
            --success: #4CAF50;
            --danger: #F44336;
            --accent: #FFC107;
            --bg: #F0F4F8;
            --text: #2C3E50;
        }

        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Fredoka One', 'Century Gothic', 'AppleGothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            font-weight: bold;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0;
        }
        .active { display: flex; }

        /* UI Elements */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px #1565C0;
            transition: 0.1s;
            margin: 10px;
            min-width: 200px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px #1565C0; }
        .btn-orange { background: var(--primary); box-shadow: 0 8px #BF360C; }
        .btn-green { background: var(--success); box-shadow: 0 8px #1B5E20; }

        input[type="text"] {
            font-size: 2rem;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid var(--secondary);
            text-align: center;
            width: 80%;
            max-width: 400px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        /* Lobby Display */
        .lobby-container {
            width: 90%;
            max-width: 800px;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 6px dashed var(--secondary);
            margin-bottom: 20px;
        }

        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-height: 40vh;
            overflow-y: auto;
            padding: 10px;
        }

        .name-card {
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 15px;
            font-size: 1.2rem;
            text-transform: capitalize;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 0px #d4a017;
        }

        /* Bracket Styles */
        .bracket-container {
            display: flex;
            gap: 40px;
            align-items: center;
            overflow-x: auto;
            padding: 40px;
            width: 100%;
        }

        .match-card {
            background: white;
            border: 4px solid #ccc;
            border-radius: 20px;
            padding: 15px;
            width: 200px;
            position: relative;
        }
        .match-active { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }
        
        .p-slot {
            padding: 10px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .p-winner { background: var(--success) !important; color: white; }

        /* Game Elements */
        #word-slots { display: flex; gap: 10px; margin-bottom: 30px; }
        .slot {
            width: 70px; height: 70px;
            border: 5px dashed #ccc;
            border-radius: 15px;
            background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
        }
        #letter-sea {
            position: relative;
            width: 90vw; height: 40vh;
            background: rgba(255,255,255,0.7);
            border: 5px solid var(--secondary);
            border-radius: 40px;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            width: 90px; height: 90px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: white;
            box-shadow: 0 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        #gear { position: fixed; top: 15px; right: 15px; font-size: 35px; cursor: pointer; opacity: 0.3; z-index: 1000; }
        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.3); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="gear" onclick="toggleDash()">⚙️</div>

    <div id="game-container">
        <!-- 1. Start Screen -->
        <div id="screen-start" class="screen active">
            <h1 style="font-size: 5rem; color: var(--primary); margin:0;">WORD RACE</h1>
            <p style="font-size: 1.5rem;">The Ultimate Tournament</p>
            <button class="btn btn-green" onclick="setRole('host')">TEACHER (Smartboard)</button>
            <button class="btn btn-orange" onclick="setRole('player')">STUDENT (iPad)</button>
        </div>

        <!-- 2. Student Name Entry -->
        <div id="screen-name-entry" class="screen">
            <h2>What is your name?</h2>
            <input type="text" id="student-name-input" placeholder="Enter Name..." maxlength="12">
            <button class="btn btn-green" onclick="joinLobby()">JOIN TOURNAMENT</button>
        </div>

        <!-- 3. Host Lobby -->
        <div id="screen-host-lobby" class="screen">
            <h1 id="lobby-count">Waiting for Students... (0/30)</h1>
            <div class="lobby-container">
                <div class="lobby-grid" id="lobby-display">
                    <!-- Names pop up here -->
                </div>
            </div>
            <p style="color: #666;">Names will appear above as students join.</p>
            <button class="btn btn-green" id="start-btn" style="display:none;" onclick="startTournament()">START TOURNAMENT</button>
        </div>

        <!-- 4. Host Bracket Display -->
        <div id="screen-host-bracket" class="screen">
            <h2 id="round-label">Round 1</h2>
            <div class="bracket-container" id="bracket-display"></div>
            <div style="margin-top: 20px;">
                <button class="btn btn-orange" onclick="nextWord()">START RACE</button>
                <button class="btn" onclick="resetGame()">RESET ALL</button>
            </div>
        </div>

        <!-- 5. Student Play Area -->
        <div id="screen-play" class="screen">
            <h2 id="game-word-prompt">Spell: ???</h2>
            <div id="word-slots"></div>
            <div id="letter-sea"></div>
        </div>

        <!-- 6. Student Waiting Screen -->
        <div id="screen-wait" class="screen">
            <h1 id="wait-status">Lobby Joined!</h1>
            <p id="wait-subtext">Look at the big screen for your name.</p>
        </div>
    </div>

    <!-- Teacher Dash -->
    <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999;" onclick="toggleDash()"></div>
    <div id="dash-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:40px; border-radius:30px; z-index:1001; width:80%; max-width:500px;">
        <h3>Teacher Settings</h3>
        <p>Words (Comma separated):</p>
        <textarea id="vocab-input" style="width:100%; height:100px; border-radius:10px; padding:10px;">APPLE, BANANA, CHERRY, DRAGON, EAGLE, FLOWER, GARDEN, HAPPY, JUNGLE</textarea>
        <button class="btn btn-green" onclick="saveDash()">SAVE & CLOSE</button>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAeW720p-jxvUKu4wGjltbV-7PzXXH2Lv8",
            authDomain: "tournament-64337.firebaseapp.com",
            databaseURL: "https://tournament-64337-default-rtdb.firebaseio.com",
            projectId: "tournament-64337",
            storageBucket: "tournament-64337.firebasestorage.app",
            messagingSenderId: "1001808716448",
            appId: "1:1001808716448:web:d2c23c00b78faebd329fc5"
        };

        let db, role, myName, myId;
        let gameState = { status: 'lobby', players: {}, matches: [], currentWord: "" };
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function playSnd(f, d) {
            const o = audio.createOscillator();
            const g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
            o.start(); o.stop(audio.currentTime + d);
        }

        // --- 2. CORE ENGINE ---
        function setRole(r) {
            role = r;
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            
            db.ref('name_race_v2').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    gameState = data;
                    syncUI();
                }
            });

            if (role === 'player') navigate('screen-name-entry');
            else navigate('screen-host-lobby');
        }

        function joinLobby() {
            const input = document.getElementById('student-name-input');
            myName = input.value.trim();
            if (!myName) return alert("Please enter your name!");
            
            myId = "p_" + Date.now();
            db.ref('name_race_v2/players/' + myId).set({ name: myName, id: myId });
            navigate('screen-wait');
        }

        function startTournament() {
            const players = Object.values(gameState.players || {});
            if (players.length < 2) return alert("At least 2 students needed!");

            // Randomize pairings
            for (let i = players.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [players[i], players[j]] = [players[j], players[i]];
            }

            const matches = [];
            for (let i = 0; i < players.length; i += 2) {
                const p1 = players[i];
                const p2 = players[i+1] || { name: "BYE", id: "bye" };
                matches.push({
                    p1: p1,
                    p2: p2,
                    winner: p2.id === 'bye' ? p1.id : null
                });
            }

            db.ref('name_race_v2').update({
                status: 'bracket',
                matches: matches,
                round: 1
            });
        }

        function nextWord() {
            const vocab = (document.getElementById('vocab-input').value.split(',')).map(v => v.trim().toUpperCase());
            const word = vocab[Math.floor(Math.random() * vocab.length)];
            db.ref('name_race_v2').update({ status: 'playing', currentWord: word });
        }

        // --- 3. UI SYNC ---
        function syncUI() {
            if (role === 'host') {
                if (gameState.status === 'lobby') {
                    renderLobby();
                    navigate('screen-host-lobby');
                } else {
                    renderBracket();
                    navigate('screen-host-bracket');
                }
            } else {
                if (gameState.status === 'playing') {
                    const activeMatch = (gameState.matches || []).find(m => (m.p1.id === myId || m.p2.id === myId) && !m.winner);
                    if (activeMatch) {
                        startMiniGame();
                        navigate('screen-play');
                    } else {
                        updateStudentWaitingStatus();
                        navigate('screen-wait');
                    }
                } else {
                    updateStudentWaitingStatus();
                    navigate('screen-wait');
                }
            }
        }

        function renderLobby() {
            const players = Object.values(gameState.players || {});
            const display = document.getElementById('lobby-display');
            display.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'name-card';
                div.innerText = p.name;
                display.appendChild(div);
            });
            document.getElementById('lobby-count').innerText = `Students Joined: ${players.length}/30`;
            document.getElementById('start-btn').style.display = players.length >= 2 ? 'block' : 'none';
        }

        function renderBracket() {
            const display = document.getElementById('bracket-display');
            display.innerHTML = '';
            (gameState.matches || []).forEach(m => {
                const card = document.createElement('div');
                card.className = `match-card ${gameState.status === 'playing' && !m.winner ? 'match-active' : ''}`;
                card.innerHTML = `
                    <div class="p-slot ${m.winner === m.p1.id ? 'p-winner' : ''}">${m.p1.name}</div>
                    <div class="p-slot ${m.winner === m.p2.id ? 'p-winner' : ''}">${m.p2.name}</div>
                `;
                display.appendChild(card);
            });
        }

        function updateStudentWaitingStatus() {
            const status = document.getElementById('wait-status');
            const sub = document.getElementById('wait-subtext');
            const myMatch = (gameState.matches || []).find(m => m.p1.id === myId || m.p2.id === myId);

            if (gameState.status === 'lobby') {
                status.innerText = "Lobby Joined!";
                sub.innerText = "Your name is on the big screen.";
            } else if (!myMatch) {
                status.innerText = "Waiting...";
                sub.innerText = "You are not in this round.";
            } else if (myMatch.winner) {
                status.innerText = myMatch.winner === myId ? "YOU WON! 🏆" : "Round Finished";
                sub.innerText = "Wait for the teacher to start the next one.";
            } else {
                status.innerText = "Get Ready!";
                sub.innerText = "The race is about to start.";
            }
        }

        // --- 4. GAMEPLAY ---
        function startMiniGame() {
            const word = gameState.currentWord;
            const slots = document.getElementById('word-slots');
            const sea = document.getElementById('letter-sea');
            document.getElementById('game-word-prompt').innerText = "Spell: " + word;
            slots.innerHTML = ''; sea.innerHTML = '';
            let progress = 0;

            word.split('').forEach(() => {
                const s = document.createElement('div');
                s.className = 'slot';
                slots.appendChild(s);
            });

            const chars = (word + "XYZ").split('').sort(() => Math.random() - 0.5);
            chars.forEach(c => {
                const b = document.createElement('div');
                bubblePhysics(b);
                b.className = 'bubble';
                b.innerText = c;
                b.style.left = (Math.random() * 80) + '%';
                b.style.top = (Math.random() * 80) + '%';
                b.onclick = () => {
                    if (c === word[progress]) {
                        playSnd(400 + (progress * 100), 0.1);
                        slots.children[progress].innerText = c;
                        b.remove();
                        progress++;
                        if (progress === word.length) submitVictory();
                    } else {
                        playSnd(150, 0.2);
                        b.style.background = "var(--danger)";
                        setTimeout(() => b.style.background = "var(--accent)", 300);
                    }
                };
                sea.appendChild(b);
            });
        }

        function bubblePhysics(el) {
            let x = Math.random() * 2 - 1;
            let y = Math.random() * 2 - 1;
            setInterval(() => {
                if(!el.parentElement) return;
                let curLeft = parseFloat(el.style.left);
                let curTop = parseFloat(el.style.top);
                if(curLeft < 0 || curLeft > 90) x *= -1;
                if(curTop < 0 || curTop > 80) y *= -1;
                el.style.left = (curLeft + x*0.2) + "%";
                el.style.top = (curTop + y*0.2) + "%";
            }, 50);
        }

        function submitVictory() {
            playSnd(800, 0.4);
            const mIdx = gameState.matches.findIndex(m => (m.p1.id === myId || m.p2.id === myId) && !m.winner);
            if (mIdx !== -1) {
                db.ref(`name_race_v2/matches/${mIdx}/winner`).set(myId);
                db.ref(`name_race_v2/status`).set('bracket');
            }
        }

        // --- 5. SYSTEM HELPERS ---
        function navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleDash() {
            const d = document.getElementById('dash-modal');
            const o = document.getElementById('overlay');
            const show = d.style.display === 'none';
            d.style.display = show ? 'block' : 'none';
            o.style.display = show ? 'block' : 'none';
        }

        function saveDash() {
            toggleDash();
        }

        function resetGame() {
            db.ref('name_race_v2').set(null);
            location.reload();
        }
    </script>
</body>
</html>
