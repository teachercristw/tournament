<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Word Race: Tournament Edition</title>
    
    <!-- CDNs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #FF5722;
            --secondary: #2196F3;
            --success: #4CAF50;
            --danger: #F44336;
            --accent: #FFC107;
            --bg: #F0F4F8;
            --text: #2C3E50;
        }

        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Century Gothic', 'AppleGothic', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            font-weight: bold;
        }

        /* --- Screens --- */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .active { display: flex; }

        /* --- UI Elements --- */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px #1565C0;
            transition: all 0.1s;
            margin: 15px;
            min-width: 320px;
            min-height: 85px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 6px #1565C0; }
        .btn-orange { background: var(--primary); box-shadow: 0 10px #BF360C; }
        .btn-green { background: var(--success); box-shadow: 0 10px #1B5E20; }

        /* --- Bracket UI --- */
        .bracket {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            width: 100%;
        }
        .matchup {
            background: white;
            border: 8px solid var(--secondary);
            border-radius: 30px;
            padding: 25px;
            min-width: 250px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .team-box {
            padding: 18px;
            margin: 12px;
            background: #e3f2fd;
            border-radius: 20px;
            font-size: 1.8rem;
        }
        .winner-box { 
            background: var(--accent) !important; 
            transform: scale(1.1);
            animation: pulse 1s infinite;
        }

        /* --- Game Area --- */
        #word-slots { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .slot {
            width: 80px; height: 80px;
            border: 6px dashed #BDBDBD;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: white;
        }
        #letter-sea {
            position: relative;
            width: 90vw;
            height: 45vh;
            background: white;
            border: 6px solid var(--secondary);
            border-radius: 40px;
            overflow: hidden;
        }
        .letter-bubble {
            position: absolute;
            width: 100px; height: 100px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px rgba(0,0,0,0.2);
            color: white;
            cursor: pointer;
        }

        /* --- Utilities --- */
        #gear { position: fixed; top: 15px; right: 15px; font-size: 40px; cursor: pointer; z-index: 1000; opacity: 0.3; }
        #status-dot { position: fixed; top: 25px; left: 25px; width: 20px; height: 20px; border-radius: 50%; background: #666; z-index: 1000; border: 2px solid white; }
        
        #dash-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 650px; background: white;
            padding: 40px; border-radius: 40px; box-shadow: 0 0 150px rgba(0,0,0,0.8);
            z-index: 1001;
            max-height: 80vh; overflow-y: auto;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }

        @keyframes pulse { 0% { transform: scale(1.1); } 50% { transform: scale(1.15); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="status-dot"></div>
    <div id="gear" onclick="toggleDash()">⚙️</div>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="screen-start" class="screen active">
            <h1 style="font-size: 5rem; color: var(--primary); margin:0;">WORD RACE</h1>
            <h2 style="color: var(--secondary);">Tournament Edition</h2>
            <button class="btn" onclick="initMode('host')">HOST SCREEN</button>
            <button class="btn btn-orange" onclick="initMode('player')">PLAYER iPAD</button>
        </div>

        <!-- Team Setup -->
        <div id="screen-setup" class="screen">
            <h1>Select Your Team</h1>
            <div id="team-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;"></div>
        </div>

        <!-- Host Bracket -->
        <div id="screen-host" class="screen">
            <h1 id="host-msg" style="color: var(--primary); font-size: 3rem;">Waiting for Teams...</h1>
            <div class="bracket" id="bracket-display"></div>
            <div style="margin-top: 40px;">
                <button class="btn btn-green" onclick="forceNewRound()">START RACE</button>
                <button class="btn btn-orange" onclick="forceResetTournament()">NEW BRACKET</button>
            </div>
        </div>

        <!-- Player Screen -->
        <div id="screen-play" class="screen">
            <h2 id="player-title" style="margin:0; color: var(--secondary); font-size: 2.5rem;">TEAM</h2>
            <div id="word-slots"></div>
            <div id="letter-sea"></div>
        </div>

        <!-- Wait Screen -->
        <div id="screen-wait" class="screen">
            <h1 id="wait-msg" style="font-size: 4rem;">Get Ready!</h1>
            <p style="font-size: 2rem;">Watch the big screen...</p>
        </div>
    </div>

    <!-- Teacher Dashboard -->
    <div class="overlay" id="overlay" onclick="toggleDash()"></div>
    <div id="dash-modal">
        <h2>Settings</h2>
        <label>Firebase Config (JSON):</label><br>
        <textarea id="fb-config" style="width:100%; height:120px; font-family:monospace;"></textarea>
        <br><br>
        <label>Vocabulary (comma separated):</label><br>
        <textarea id="vocab-input" style="width:100%; height:60px;">APPLE, BANANA, ORANGE, CHERRY, DRAGON, SCHOOL, HAPPY, SUMMER</textarea>
        <div style="margin-top:20px;">
            <button class="btn" style="min-width:150px; font-size:1.2rem;" onclick="saveConfig()">SAVE & SYNC</button>
            <button class="btn btn-orange" style="min-width:150px; font-size:1.2rem;" onclick="toggleDash()">CLOSE</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & STATE ---
        const fbConfigDefault = {
            apiKey: "AIzaSyAeW720p-jxvUKu4wGjltbV-7PzXXH2Lv8",
            authDomain: "tournament-64337.firebaseapp.com",
            databaseURL: "https://tournament-64337-default-rtdb.firebaseio.com",
            projectId: "tournament-64337",
            storageBucket: "tournament-64337.firebasestorage.app",
            messagingSenderId: "1001808716448",
            appId: "1:1001808716448:web:d2c23c00b78faebd329fc5"
        };

        let db = null;
        let myTeamId = null;
        let role = null;
        let gameState = {
            status: "waiting",
            currentWord: "",
            matches: [],
            vocab: ["APPLE", "BANANA", "ORANGE"]
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- 2. FIREBASE CORE ---
        function initFirebase(config) {
            document.getElementById('status-dot').style.background = "#2196F3"; // Blue: Connecting
            try {
                if (!firebase.apps.length) firebase.initializeApp(config);
                db = firebase.database();
                
                db.ref('word_race_tourney').on('value', (snap) => {
                    const data = snap.val();
                    if (data) {
                        gameState = data;
                        document.getElementById('status-dot').style.background = "#4CAF50"; // Green: Synced
                        syncUI();
                    } else {
                        // DB is empty, host should initialize
                        if (role === 'host') forceResetTournament();
                    }
                }, (err) => {
                    document.getElementById('status-dot').style.background = "#F44336"; // Red: Error
                    console.error("Firebase Read Error:", err);
                });
            } catch (e) {
                document.getElementById('status-dot').style.background = "#F44336";
            }
        }

        // --- 3. TOURNAMENT LOGIC ---
        function forceResetTournament() {
            const teams = [1,2,3,4,5,6].sort(() => Math.random() - 0.5);
            const matches = [
                { t1: teams[0], t2: teams[1], winner: null },
                { t1: teams[2], t2: teams[3], winner: null },
                { t1: teams[4], t2: teams[5], winner: null }
            ];
            db.ref('word_race_tourney').set({
                status: "waiting",
                currentWord: "",
                matches: matches,
                vocab: gameState.vocab || ["APPLE", "BANANA", "ORANGE"]
            });
        }

        function forceNewRound() {
            const word = gameState.vocab[Math.floor(Math.random() * gameState.vocab.length)];
            const clearedMatches = gameState.matches.map(m => ({...m, winner: null}));
            db.ref('word_race_tourney').update({
                status: "playing",
                currentWord: word,
                matches: clearedMatches
            });
        }

        // --- 4. PLAYER GAME ENGINE ---
        function setupGame(word) {
            const slots = document.getElementById('word-slots');
            const sea = document.getElementById('letter-sea');
            slots.innerHTML = ''; sea.innerHTML = '';
            
            let solvedIdx = 0;
            const letters = word.split('');
            
            letters.forEach(() => {
                const s = document.createElement('div');
                s.className = 'slot';
                slots.appendChild(s);
            });

            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const pool = [...letters, alphabet[Math.floor(Math.random()*26)]].sort(() => Math.random() - 0.5);

            pool.forEach(char => {
                const bubble = document.createElement('div');
                bubble.className = 'letter-bubble';
                bubble.innerText = char;
                bubble.style.left = (10 + Math.random() * 70) + '%';
                bubble.style.top = (10 + Math.random() * 70) + '%';
                
                bubble.onclick = () => {
                    if (char === word[solvedIdx]) {
                        playTone(400 + (solvedIdx * 100), 0.1);
                        slots.children[solvedIdx].innerText = char;
                        slots.children[solvedIdx].style.borderColor = 'var(--success)';
                        bubble.remove();
                        solvedIdx++;
                        if (solvedIdx === word.length) {
                            playTone(800, 0.3);
                            submitWin();
                        }
                    } else {
                        playTone(150, 0.2);
                        bubble.style.background = 'var(--danger)';
                        setTimeout(() => bubble.style.background = 'var(--accent)', 400);
                    }
                };
                sea.appendChild(bubble);
            });
        }

        function submitWin() {
            const matchIdx = gameState.matches.findIndex(m => m.t1 == myTeamId || m.t2 == myTeamId);
            if (matchIdx > -1 && !gameState.matches[matchIdx].winner) {
                db.ref(`word_race_tourney/matches/${matchIdx}/winner`).set(myTeamId);
            }
        }

        // --- 5. UI SYNC ---
        function syncUI() {
            if (role === 'host') {
                renderHostBracket();
            } else if (role === 'player' && myTeamId) {
                handlePlayerLogic();
            }
        }

        function handlePlayerLogic() {
            const match = gameState.matches.find(m => m.t1 == myTeamId || m.t2 == myTeamId);
            if (!match || gameState.status !== 'playing' || match.winner) {
                if (match && match.winner) {
                    document.getElementById('wait-msg').innerText = (match.winner == myTeamId) ? "WINNER! 🏆" : "TOO SLOW! 💨";
                } else {
                    document.getElementById('wait-msg').innerText = "Get Ready...";
                }
                showScreen('screen-wait');
                return;
            }
            setupGame(gameState.currentWord);
            showScreen('screen-play');
        }

        function renderHostBracket() {
            const container = document.getElementById('bracket-display');
            container.innerHTML = '';
            gameState.matches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'matchup';
                div.innerHTML = `
                    <div class="team-box ${m.winner == m.t1 ? 'winner-box' : ''}">TEAM ${m.t1}</div>
                    <div style="color:#aaa">VS</div>
                    <div class="team-box ${m.winner == m.t2 ? 'winner-box' : ''}">TEAM ${m.t2}</div>
                `;
                container.appendChild(div);
            });
            document.getElementById('host-msg').innerText = gameState.status === 'playing' ? "RACE IN PROGRESS" : "Ready to Race!";
        }

        // --- 6. NAVIGATION & DASH ---
        function initMode(m) {
            role = m;
            if (m === 'player') {
                renderTeamSelection();
                showScreen('screen-setup');
            } else {
                showScreen('screen-host');
            }
            initFirebase(fbConfigDefault);
        }

        function renderTeamSelection() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = '';
            for(let i=1; i<=6; i++) {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = `TEAM ${i}`;
                b.onclick = () => { myTeamId = i; document.getElementById('player-title').innerText = `TEAM ${i}`; showScreen('screen-wait'); syncUI(); };
                grid.appendChild(b);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleDash() {
            const m = document.getElementById('dash-modal');
            const o = document.getElementById('overlay');
            const show = m.style.display === 'none' || m.style.display === '';
            m.style.display = show ? 'block' : 'none';
            o.style.display = show ? 'block' : 'none';
            if (show) {
                document.getElementById('fb-config').value = JSON.stringify(fbConfigDefault, null, 2);
                document.getElementById('vocab-input').value = gameState.vocab.join(', ');
            }
        }

        function saveConfig() {
            const v = document.getElementById('vocab-input').value.split(',').map(x => x.trim().toUpperCase());
            if (db) db.ref('word_race_tourney/vocab').set(v);
            toggleDash();
        }

        function playTone(freq, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        window.onload = () => {
            // Check status dot early
            document.getElementById('status-dot').style.background = "#666";
        };
    </script>
</body>
</html>
