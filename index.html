<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Tournament: Name Race</title>
    
    <!-- CDNs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        /* --- Color Palette --- */
        :root {
            --primary: #FF5722;
            --secondary: #2196F3;
            --success: #4CAF50;
            --danger: #F44336;
            --accent: #FFC107;
            --bg: #F0F4F8;
            --text: #2C3E50;
        }

        /* --- Mandatory Smartboard/Tablet Constraints --- */
        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-weight: bold;
            background-color: var(--bg);
            color: var(--text);
            background-size: cover;
            background-position: center;
        }

        /* --- Screen Routing --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0;
            background: rgba(240, 244, 248, 0.85);
        }
        .active { display: flex; }

        /* --- UI Elements (Large Hit Areas) --- */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px #1565C0;
            transition: all 0.1s;
            margin: 15px;
            min-width: 280px;
            min-height: 80px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 4px #1565C0; }
        .btn-orange { background: var(--primary); box-shadow: 0 10px #BF360C; }
        .btn-green { background: var(--success); box-shadow: 0 10px #1B5E20; }
        .btn-danger { background: var(--danger); box-shadow: 0 10px #B71C1C; }
        .btn-disabled { background: #9E9E9E !important; box-shadow: 0 10px #616161 !important; cursor: not-allowed; }

        input[type="text"], input[type="password"], input[type="tel"] {
            font-size: 3rem;
            padding: 20px;
            border-radius: 25px;
            border: 6px solid var(--secondary);
            text-align: center;
            width: 85%;
            max-width: 500px;
            margin-bottom: 30px;
            font-family: inherit;
            font-weight: bold;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* --- Host Lobby Display --- */
        .lobby-container {
            width: 95%;
            max-width: 1000px;
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 8px dashed var(--secondary);
            margin-bottom: 25px;
        }

        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-height: 40vh;
            overflow-y: auto;
            padding: 10px;
        }

        .name-card {
            background: var(--accent);
            color: white;
            padding: 15px;
            border-radius: 18px;
            font-size: 1.6rem;
            text-transform: capitalize;
            animation: popIn 0.3s ease-out;
            box-shadow: 0 6px 0px #F57F17;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
        }

        /* --- Tournament Bracket --- */
        .bracket-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            max-height: 55vh;
            padding: 20px;
            width: 100%;
        }

        .match-card {
            background: white;
            border: 6px solid #CFD8DC;
            border-radius: 25px;
            padding: 15px;
            width: 240px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .match-active { border-color: var(--primary); box-shadow: 0 0 30px rgba(255, 87, 34, 0.6); transform: scale(1.05); }
        
        .p-slot {
            padding: 15px;
            margin: 8px 0;
            background: #ECEFF1;
            border-radius: 15px;
            font-size: 1.4rem;
            transition: background 0.3s;
        }
        .p-winner { background: var(--success) !important; color: white; animation: popIn 0.4s; }

        /* --- Student Mini-Game --- */
        #word-slots { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .slot {
            width: 85px; height: 85px;
            border: 6px dashed #BDBDBD;
            border-radius: 20px;
            background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem;
            text-transform: uppercase;
        }
        #letter-sea {
            position: relative;
            width: 95vw; height: 45vh;
            background: rgba(255,255,255,0.9);
            border: 8px solid var(--secondary);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }
        .bubble {
            position: absolute;
            width: 95px; height: 95px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: white;
            box-shadow: 0 10px rgba(0,0,0,0.25);
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
        }

        /* --- Dashboard, Utilities & Modals --- */
        #gear { position: fixed; top: 20px; right: 20px; font-size: 45px; cursor: pointer; opacity: 0.3; z-index: 1000; transition: 0.2s;}
        #gear:hover { opacity: 1; }
        #status-indicator { position: fixed; top: 25px; left: 25px; width: 25px; height: 25px; border-radius: 50%; background: #9E9E9E; z-index: 1000; border: 3px solid white; box-shadow: 0 4px rgba(0,0,0,0.2);}
        
        #leave-btn {
            display: none; position: fixed; top: 20px; left: 20px;
            background: var(--danger); color: white;
            padding: 15px 25px; border-radius: 30px;
            font-size: 1.5rem; cursor: pointer; font-weight: bold;
            box-shadow: 0 6px #B71C1C; z-index: 1000; border: 4px solid white;
        }
        #leave-btn:active { transform: translateY(4px); box-shadow: 0 2px #B71C1C; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 35px; z-index: 1001;
            width: 90%; max-width: 650px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .dash-section { text-align: left; margin-bottom: 25px; }
        .dash-section label { color: var(--primary); font-size: 1.4rem; display: block; margin-bottom: 5px;}
        .dash-section textarea, .dash-section input[type="text"], .dash-section input[type="password"] { 
            width: 100%; border-radius: 15px; padding: 15px; border: 4px solid #E0E0E0; font-family: monospace; font-size: 1.1rem; box-sizing: border-box; margin-bottom:0;
        }
        .file-upload { display: inline-block; padding: 15px 30px; background: var(--secondary); color: white; border-radius: 50px; cursor: pointer; font-size: 1.2rem; margin-top: 5px; box-shadow: 0 6px #1565C0;}

        @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } 100% { transform: translateY(0px) rotate(0deg); } }
    </style>
</head>
<body>

    <div id="status-indicator" title="Connection Status"></div>
    <!-- Gear icon strictly prompts password for Dashboard intent -->
    <div id="gear" onclick="promptPassword('dash')">⚙️</div>
    <!-- Student Logout Button -->
    <div id="leave-btn" onclick="studentLogout()">🚪 LEAVE GAME</div>

    <div id="game-container">
        <!-- 1. Start Screen -->
        <div id="screen-start" class="screen active">
            <h1 style="font-size: 6rem; color: var(--primary); margin:0; text-shadow: 4px 4px 0px white;">WORD RACE</h1>
            <p style="font-size: 2.5rem; color: var(--secondary); margin-bottom: 40px;">Interactive Tournament</p>
            <!-- Teacher button strictly prompts password for Host intent -->
            <button class="btn btn-green" onclick="promptPassword('host')">TEACHER (Smartboard)</button>
            <button class="btn btn-orange" onclick="setRole('player')">STUDENT (iPad)</button>
        </div>

        <!-- 2. Student Name Entry -->
        <div id="screen-name-entry" class="screen">
            <h2 style="font-size: 3.5rem; color: var(--secondary); text-shadow: 2px 2px 0px white;">What is your name?</h2>
            <input type="text" id="student-name-input" placeholder="Name here..." maxlength="12" autocomplete="off">
            <button class="btn btn-green" onclick="joinLobby()">JOIN GAME</button>
        </div>

        <!-- 3. Host Lobby -->
        <div id="screen-host-lobby" class="screen">
            <h1 id="lobby-count" style="color: var(--primary); font-size: 3.5rem; text-shadow: 2px 2px 0px white;">Waiting for Students... (0)</h1>
            <div class="lobby-container">
                <div class="lobby-grid" id="lobby-display"></div>
            </div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-green" id="start-btn" onclick="startTournament()">START TOURNAMENT</button>
                <button class="btn btn-danger" onclick="clearLobby()">CLEAR LOBBY</button>
            </div>
        </div>

        <!-- 4. Host Bracket Display -->
        <div id="screen-host-bracket" class="screen">
            <h1 id="round-label" style="color: var(--primary); font-size: 4rem; text-shadow: 2px 2px 0px white;">Tournament Bracket</h1>
            <div class="bracket-container" id="bracket-display"></div>
            <div style="margin-top: 30px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-secondary" id="race-btn" onclick="nextWord()">START RACE (THIS ROUND)</button>
                <button class="btn btn-green" id="advance-btn" onclick="advanceRound()" style="display:none;">ADVANCE TO NEXT ROUND</button>
                <button class="btn btn-orange" onclick="resetGame()">END TOURNAMENT</button>
            </div>
        </div>

        <!-- 5. Student Play Area -->
        <div id="screen-play" class="screen">
            <h2 id="game-word-prompt" style="font-size: 4rem; color: var(--primary); text-shadow: 2px 2px 0px white;">Spell the word!</h2>
            <div id="word-slots"></div>
            <div id="letter-sea"></div>
        </div>

        <!-- 6. Student Waiting Screen -->
        <div id="screen-wait" class="screen">
            <h1 id="wait-status" style="font-size: 5rem; color: var(--secondary); text-shadow: 3px 3px 0px white;">You're In!</h1>
            <p id="wait-subtext" style="font-size: 2.5rem; font-weight: bold;">Look at the Smartboard.</p>
        </div>
        
        <!-- 7. Champion Screen -->
        <div id="screen-champion" class="screen">
            <h1 style="font-size: 6rem; color: var(--accent); text-shadow: 4px 4px 0px white;">🏆 GRAND CHAMPION 🏆</h1>
            <h2 id="champion-name" style="font-size: 5rem; color: var(--primary); background: white; padding: 20px 60px; border-radius: 50px; border: 8px dashed var(--secondary);">Name</h2>
            <button class="btn btn-orange" onclick="resetGame()" style="margin-top: 40px;">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="overlay" id="overlay" onclick="closeModals()"></div>
    <div class="modal" id="password-modal" style="max-width: 400px; text-align: center;">
        <h2 style="color: var(--primary); font-size: 2.5rem; margin-top: 0;">Teacher Access</h2>
        <input type="tel" id="dash-pass-input" placeholder="Enter PIN..." autocomplete="off">
        <button class="btn btn-green" style="min-width: 100%; margin: 10px 0;" onclick="verifyPassword()">ENTER</button>
        <button class="btn btn-orange" style="min-width: 100%; margin: 10px 0;" onclick="closeModals()">CANCEL</button>
    </div>

    <!-- Teacher Dash Modal -->
    <div class="modal" id="dash-modal">
        <h2 style="color: var(--primary); font-size: 2.5rem; margin-top: 0;">Teacher Dashboard</h2>
        
        <div class="dash-section">
            <label>Dashboard Password (PIN)</label>
            <input type="text" id="pass-setting-input">
        </div>

        <div class="dash-section">
            <label>Firebase Config (JSON)</label>
            <textarea id="config-input" rows="4"></textarea>
        </div>
        
        <div class="dash-section">
            <label>Vocabulary (Comma Separated)</label>
            <textarea id="vocab-input" rows="3"></textarea>
        </div>

        <div class="dash-section">
            <label>Game Background Image</label>
            <label class="file-upload">
                Upload Image
                <input type="file" id="bg-upload" style="display: none;" accept="image/*" onchange="handleImageUpload(event)">
            </label>
            <button class="btn" style="min-width: 100px; min-height: 40px; padding: 10px; font-size: 1rem;" onclick="clearBg()">Clear</button>
        </div>

        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 30px;">
            <button class="btn btn-green" style="font-size: 1.4rem; min-width: 200px;" onclick="saveDash()">SAVE & APPLY</button>
            <button class="btn btn-orange" style="font-size: 1.4rem; min-width: 200px;" onclick="exportSettings()">EXPORT JSON</button>
        </div>
        <div style="margin-top: 25px; text-align: center;">
            <label style="cursor: pointer; color: var(--secondary); text-decoration: underline; font-size: 1.2rem;">
                Import Settings JSON
                <input type="file" style="display: none;" accept=".json" onchange="importSettings(event)">
            </label>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. STATE & CONFIGURATION
        // ==========================================
        let appSettings = {
            dashPassword: "1037440", // Stored explicitly as a string
            firebaseConfig: {
                apiKey: "AIzaSyAeW720p-jxvUKu4wGjltbV-7PzXXH2Lv8",
                authDomain: "tournament-64337.firebaseapp.com",
                databaseURL: "https://tournament-64337-default-rtdb.firebaseio.com",
                projectId: "tournament-64337",
                storageBucket: "tournament-64337.firebasestorage.app",
                messagingSenderId: "1001808716448",
                appId: "1:1001808716448:web:d2c23c00b78faebd329fc5"
            },
            vocab: ["APPLE", "BANANA", "ORANGE", "ELEPHANT", "TIGER", "SCHOOL", "TEACHER", "HAPPY"],
            bgImageBase64: ""
        };

        let db;
        let role = null;
        let myName = null;
        let myId = null;
        let currentPinIntent = ''; // Tracks if PIN is for 'host' or 'dash'
        
        let playerList = {}; 
        let sysState = { status: 'lobby', matches: [], currentWord: "", vocabMemory: [], champion: null };

        // ==========================================
        // 2. WEB AUDIO API
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSnd(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        // ==========================================
        // 3. FIREBASE LOGIC & PRESENCE SYSTEM
        // ==========================================
        function initFirebase() {
            try {
                if (firebase.apps.length === 0) firebase.initializeApp(appSettings.firebaseConfig);
                db = firebase.database();
                
                db.ref('.info/connected').on('value', snap => {
                    document.getElementById('status-indicator').style.background = snap.val() ? "var(--success)" : "var(--accent)";
                });

                db.ref('fast_race/players').on('value', (snap) => {
                    playerList = snap.val() || {};
                    if (role === 'host' && sysState.status === 'lobby') renderLobby();
                });
                
                db.ref('fast_race/sys').on('value', (snap) => {
                    const data = snap.val();
                    if (data) {
                        sysState = data;
                        syncUI();
                    } else if (role === 'host') {
                        db.ref('fast_race/sys').set({ status: 'lobby', matches: [] });
                    }
                });

                applyBackground();
            } catch (e) {
                alert("Firebase Config Error! Check Dashboard.");
                document.getElementById('status-indicator').style.background = "var(--danger)";
            }
        }

        function setRole(selectedRole) {
            role = selectedRole;
            initFirebase();
            if (role === 'player') navigate('screen-name-entry');
            else navigate('screen-host-lobby');
            if (audioCtx.state === 'suspended') audioCtx.resume();
            toggleLeaveButton();
        }

        function joinLobby() {
            const input = document.getElementById('student-name-input');
            myName = input.value.trim();
            if (!myName) return alert("Type your name!");
            
            const count = Object.keys(playerList).length;
            if (count >= 30) return alert("Lobby is full (Max 30)!");

            myId = "p_" + Date.now() + Math.floor(Math.random()*1000);
            const playerRef = db.ref('fast_race/players/' + myId);
            
            // Push to Firebase and set up Disconnect rule
            playerRef.set({ name: myName, id: myId }).then(() => {
                playerRef.onDisconnect().remove(); // PRESENCE SYSTEM
                navigate('screen-wait');
                updateWaitScreen();
                toggleLeaveButton();
            });
        }

        function studentLogout() {
            if(confirm("Are you sure you want to leave the game?")) {
                if(myId && db) {
                    db.ref('fast_race/players/' + myId).remove(); // Explicit removal
                }
                myId = null;
                myName = null;
                role = null;
                toggleLeaveButton();
                navigate('screen-start');
            }
        }

        function toggleLeaveButton() {
            document.getElementById('leave-btn').style.display = (role === 'player' && myId) ? 'block' : 'none';
        }

        function clearLobby() {
            if(confirm("Are you sure? This will kick all students currently waiting.")) {
                db.ref('fast_race/players').remove();
            }
        }

        // ==========================================
        // 4. TOURNAMENT LOGIC (HOST)
        // ==========================================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startTournament() {
            const players = Object.values(playerList);
            if (players.length < 2) return alert("Need at least 2 students!");

            shuffleArray(players);

            const matches = [];
            for (let i = 0; i < players.length; i += 2) {
                const p1 = players[i];
                const p2 = players[i+1];
                if (p2) {
                    matches.push({ p1: p1, p2: p2, winner: null });
                } else {
                    matches.push({ p1: p1, p2: { name: "BYE (Auto-Win)", id: "bye" }, winner: p1.id });
                }
            }

            db.ref('fast_race/sys').update({
                status: 'bracket',
                matches: matches,
                vocabMemory: [...appSettings.vocab],
                currentWord: "",
                champion: null
            });
        }

        function nextWord() {
            let memory = sysState.vocabMemory || [...appSettings.vocab];
            if (memory.length === 0) memory = [...appSettings.vocab];

            const randIdx = Math.floor(Math.random() * memory.length);
            const word = memory.splice(randIdx, 1)[0];

            db.ref('fast_race/sys').update({ 
                status: 'playing', 
                currentWord: word,
                vocabMemory: memory
            });
        }

        function advanceRound() {
            const currentMatches = sysState.matches || [];
            const winners = [];
            
            currentMatches.forEach(m => {
                if (m.winner) {
                    winners.push(m.winner === m.p1.id ? m.p1 : m.p2);
                }
            });

            if (winners.length === 1) {
                db.ref('fast_race/sys').update({ status: 'champion', champion: winners[0] });
                return;
            }

            shuffleArray(winners); // Optional: Shuffle winners for next bracket

            const newMatches = [];
            for (let i = 0; i < winners.length; i += 2) {
                const p1 = winners[i];
                const p2 = winners[i+1];
                if (p2) {
                    newMatches.push({ p1: p1, p2: p2, winner: null });
                } else {
                    newMatches.push({ p1: p1, p2: { name: "BYE (Auto-Win)", id: "bye" }, winner: p1.id });
                }
            }

            db.ref('fast_race/sys').update({
                status: 'bracket',
                matches: newMatches,
                currentWord: ""
            });
        }

        // ==========================================
        // 5. UI RENDERING
        // ==========================================
        function navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function syncUI() {
            toggleLeaveButton();
            if (role === 'host') {
                if (sysState.status === 'lobby') {
                    navigate('screen-host-lobby');
                    renderLobby();
                } else if (sysState.status === 'champion') {
                    navigate('screen-champion');
                    document.getElementById('champion-name').innerText = sysState.champion.name;
                    playSnd('win');
                } else {
                    navigate('screen-host-bracket');
                    renderBracket();
                }
            } else if (role === 'player' && myId) {
                if (sysState.status === 'champion') {
                    navigate('screen-champion');
                    document.getElementById('champion-name').innerText = sysState.champion.name;
                } else if (sysState.status === 'playing') {
                    const myActiveMatch = (sysState.matches || []).find(m => (m.p1.id === myId || m.p2?.id === myId) && !m.winner);
                    if (myActiveMatch) {
                        navigate('screen-play');
                        setupMiniGame();
                    } else {
                        navigate('screen-wait');
                        updateWaitScreen();
                    }
                } else {
                    navigate('screen-wait');
                    updateWaitScreen();
                }
            }
        }

        function renderLobby() {
            const players = Object.values(playerList);
            const display = document.getElementById('lobby-display');
            display.innerHTML = '';
            
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'name-card';
                div.innerText = p.name;
                display.appendChild(div);
            });

            document.getElementById('lobby-count').innerText = `Students Joined: ${players.length}`;
            const btn = document.getElementById('start-btn');
            
            if (players.length >= 2) {
                btn.classList.remove('btn-disabled');
            } else {
                btn.classList.add('btn-disabled');
            }
        }

        function renderBracket() {
            const display = document.getElementById('bracket-display');
            display.innerHTML = '';
            
            let allFinished = true;
            (sysState.matches || []).forEach(m => {
                if (!m.winner) allFinished = false;
                const card = document.createElement('div');
                card.className = `match-card ${sysState.status === 'playing' && !m.winner ? 'match-active' : ''}`;
                card.innerHTML = `
                    <div class="p-slot ${m.winner === m.p1.id ? 'p-winner' : ''}">${m.p1.name}</div>
                    <div class="p-slot ${m.winner === m.p2?.id ? 'p-winner' : ''}">${m.p2 ? m.p2.name : '---'}</div>
                `;
                display.appendChild(card);
            });
            
            document.getElementById('round-label').innerText = sysState.status === 'playing' ? `SPELL: ${sysState.currentWord}` : "Tournament Bracket";
            
            const raceBtn = document.getElementById('race-btn');
            const advanceBtn = document.getElementById('advance-btn');
            
            if (allFinished && sysState.matches.length > 0) {
                raceBtn.style.display = 'none';
                advanceBtn.style.display = 'inline-block';
            } else {
                raceBtn.style.display = 'inline-block';
                advanceBtn.style.display = 'none';
                if(sysState.status === 'playing') {
                    raceBtn.classList.add('btn-disabled');
                    raceBtn.innerText = "RACE IN PROGRESS...";
                } else {
                    raceBtn.classList.remove('btn-disabled');
                    raceBtn.innerText = "START RACE (THIS ROUND)";
                }
            }
        }

        function updateWaitScreen() {
            const status = document.getElementById('wait-status');
            const sub = document.getElementById('wait-subtext');
            const myMatch = (sysState.matches || []).find(m => m.p1.id === myId || m.p2?.id === myId);

            if (sysState.status === 'lobby') {
                status.innerText = "You're In!";
                sub.innerText = "Look at the Smartboard to see your name.";
            } else if (!myMatch) {
                status.innerText = "Waiting...";
                sub.innerText = "You are not in this match.";
            } else if (myMatch.winner) {
                status.innerText = myMatch.winner === myId ? "YOU ADVANCE! 🏆" : "Too Slow! 💨";
                sub.innerText = "Wait for the next round.";
            } else {
                status.innerText = "Get Ready!";
                sub.innerText = "The teacher is about to start your race.";
            }
        }

        // ==========================================
        // 6. STUDENT MINIGAME (Spelling Race)
        // ==========================================
        function setupMiniGame() {
            const word = sysState.currentWord;
            const slots = document.getElementById('word-slots');
            const sea = document.getElementById('letter-sea');
            
            document.getElementById('game-word-prompt').innerText = `Spell: ${word}`;
            slots.innerHTML = ''; sea.innerHTML = '';
            let progress = 0;

            word.split('').forEach(() => {
                const s = document.createElement('div');
                s.className = 'slot';
                slots.appendChild(s);
            });

            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const chars = [...word.split(''), alphabet[Math.floor(Math.random()*26)], alphabet[Math.floor(Math.random()*26)]];
            
            shuffleArray(chars);

            chars.forEach((c, index) => {
                const b = document.createElement('div');
                b.className = 'bubble';
                b.innerText = c;
                b.style.left = (Math.random() * 80 + 5) + '%';
                b.style.top = (Math.random() * 70 + 5) + '%';
                
                b.style.animationDelay = (index * 0.2) + "s";
                
                b.onclick = () => {
                    if (c === word[progress]) {
                        playSnd('correct');
                        slots.children[progress].innerText = c;
                        slots.children[progress].style.borderColor = "var(--success)";
                        b.remove();
                        progress++;
                        if (progress === word.length) declareWinner();
                    } else {
                        playSnd('wrong');
                        b.style.background = "var(--danger)";
                        setTimeout(() => b.style.background = "var(--accent)", 300);
                    }
                };
                sea.appendChild(b);
            });
        }

        function declareWinner() {
            playSnd('win');
            const mIdx = sysState.matches.findIndex(m => (m.p1.id === myId || m.p2?.id === myId) && !m.winner);
            if (mIdx !== -1) {
                navigate('screen-wait');
                db.ref(`fast_race/sys/matches/${mIdx}/winner`).set(myId);
            }
        }

        // ==========================================
        // 7. DASHBOARD & PASSWORD SECURITY
        // ==========================================
        function promptPassword(intent) {
            currentPinIntent = intent;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('password-modal').style.display = 'block';
            document.getElementById('dash-pass-input').value = '';
        }

        function verifyPassword() {
            const input = document.getElementById('dash-pass-input').value.trim();
            const validPin = appSettings.dashPassword.toString().trim();

            if (input === validPin) {
                closeModals();
                if (currentPinIntent === 'host') {
                    setRole('host');
                } else if (currentPinIntent === 'dash') {
                    openDashboard();
                }
            } else {
                alert("Incorrect PIN!");
            }
        }

        function closeModals() {
            document.getElementById('password-modal').style.display = 'none';
            document.getElementById('dash-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function openDashboard() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('dash-modal').style.display = 'block';
            
            document.getElementById('pass-setting-input').value = appSettings.dashPassword;
            document.getElementById('config-input').value = JSON.stringify(appSettings.firebaseConfig, null, 2);
            document.getElementById('vocab-input').value = appSettings.vocab.join(', ');
        }

        function saveDash() {
            try {
                // Ensure password is treated as a string
                appSettings.dashPassword = document.getElementById('pass-setting-input').value.toString().trim();
                appSettings.firebaseConfig = JSON.parse(document.getElementById('config-input').value);
                appSettings.vocab = document.getElementById('vocab-input').value.split(',').map(w => w.trim().toUpperCase()).filter(w => w);
                
                localStorage.setItem('esl_settings', JSON.stringify(appSettings));
                initFirebase();
                closeModals();
                alert("Settings Applied!");
            } catch (e) { alert("Invalid Firebase JSON format!"); }
        }

        function resetGame() {
            if(confirm("End Tournament and clear all students?")) {
                db.ref('fast_race/sys').set({ status: 'lobby', matches: [] });
                db.ref('fast_race/players').remove(); 
            }
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                appSettings.bgImageBase64 = event.target.result;
                applyBackground();
                alert("Background Image Loaded!");
            };
            reader.readAsDataURL(file);
        }

        function clearBg() {
            appSettings.bgImageBase64 = "";
            applyBackground();
        }

        function applyBackground() {
            if (appSettings.bgImageBase64) {
                document.body.style.backgroundImage = `url(${appSettings.bgImageBase64})`;
            } else {
                document.body.style.backgroundImage = 'none';
            }
        }

        function exportSettings() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appSettings, null, 2));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = "NameRace_Settings.json";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        function importSettings(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.firebaseConfig && imported.vocab && imported.dashPassword !== undefined) {
                        // Coerce password to string just in case
                        imported.dashPassword = imported.dashPassword.toString();
                        appSettings = imported;
                        openDashboard(); // Refresh inputs
                        applyBackground();
                        alert("Settings Imported!");
                    } else alert("Invalid Settings File.");
                } catch(err) { alert("Error reading file."); }
            };
            reader.readAsText(file);
        }

        // --- Init Local Storage on Load ---
        window.onload = () => {
            const saved = localStorage.getItem('esl_settings');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.dashPassword !== undefined) parsed.dashPassword = parsed.dashPassword.toString();
                    appSettings = parsed;
                    applyBackground();
                } catch(e){}
            }
        };
    </script>
</body>
