<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Word Race: Auto-Tournament</title>
    
    <!-- CDNs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF5722;
            --secondary: #2196F3;
            --success: #4CAF50;
            --danger: #F44336;
            --accent: #FFC107;
            --bg: #F0F4F8;
            --text: #2C3E50;
        }

        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Fredoka One', 'Century Gothic', 'AppleGothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            font-weight: bold;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0;
        }
        .active { display: flex; }

        /* UI Elements */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px #1565C0;
            transition: 0.1s;
            margin: 10px;
            min-width: 280px;
            min-height: 70px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px #1565C0; }
        .btn-orange { background: var(--primary); box-shadow: 0 8px #BF360C; }
        .btn-green { background: var(--success); box-shadow: 0 8px #1B5E20; }

        /* Tournament Map */
        .tournament-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 95%;
            margin-top: 20px;
        }
        .round-col { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        .match-card {
            background: white;
            border: 4px solid #ddd;
            border-radius: 15px;
            padding: 10px;
            transition: 0.3s;
        }
        .match-active { border-color: var(--primary); box-shadow: 0 0 20px rgba(255,87,34,0.3); }
        .team-row {
            padding: 8px;
            margin: 4px;
            background: #f1f1f1;
            border-radius: 8px;
            font-size: 1.2rem;
        }
        .winner { background: var(--accent) !important; color: white; }

        /* Game Area */
        #word-slots { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .slot {
            width: 65px; height: 65px;
            border: 4px dashed #ccc;
            border-radius: 12px;
            background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }
        #letter-sea {
            position: relative;
            width: 90vw; height: 40vh;
            background: rgba(255,255,255,0.5);
            border-radius: 30px;
            border: 4px solid var(--secondary);
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            width: 80px; height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: white;
            box-shadow: 0 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* Utilities */
        #gear { position: fixed; top: 10px; right: 10px; font-size: 30px; cursor: pointer; z-index: 1000; opacity: 0.3; }
        #status-bar { position: fixed; top: 10px; left: 10px; display: flex; gap: 10px; align-items: center; z-index: 1000; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #ccc; }
        
        #dash-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 500px; background: white;
            padding: 30px; border-radius: 30px; box-shadow: 0 0 100px rgba(0,0,0,0.5);
            z-index: 1001;
        }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="dot-net" class="dot"></div>
        <div id="dot-sync" class="dot"></div>
    </div>
    <div id="gear" onclick="toggleDash()">⚙️</div>

    <div id="game-container">
        <!-- Start -->
        <div id="screen-start" class="screen active">
            <h1 style="font-size: 4rem; color: var(--primary);">WORD RACE</h1>
            <p>Automatic Tournament System</p>
            <button class="btn" onclick="initApp('host')">HOST (Smartboard)</button>
            <button class="btn btn-orange" onclick="initApp('player')">PLAYER (iPad)</button>
        </div>

        <!-- Team Selection -->
        <div id="screen-setup" class="screen">
            <h2>Select Your Team</h2>
            <div id="team-grid" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;"></div>
        </div>

        <!-- Host -->
        <div id="screen-host" class="screen">
            <h2 id="host-msg">Round 1</h2>
            <div class="tournament-container">
                <div class="round-col" id="col-r1"></div>
                <div class="round-col" id="col-r2"></div>
                <div class="round-col" id="col-r3"></div>
            </div>
            <div style="margin-top:20px;">
                <button class="btn btn-green" onclick="triggerNextRace()">START RACE (Next Word)</button>
                <button class="btn btn-orange" onclick="resetTournament()">RESET TOURNAMENT</button>
            </div>
        </div>

        <!-- Playing -->
        <div id="screen-play" class="screen">
            <h2 id="play-team-label">TEAM X</h2>
            <div id="word-slots"></div>
            <div id="letter-sea"></div>
        </div>

        <!-- Waiting -->
        <div id="screen-wait" class="screen">
            <h1 id="wait-msg">Wait for Race...</h1>
            <p id="match-info">Your team is not in this round.</p>
            <button class="btn" style="min-width: 100px; font-size: 1rem;" onclick="manualSync()">RE-SYNC DEVICE</button>
        </div>
    </div>

    <!-- Dash -->
    <div class="overlay" id="overlay" onclick="toggleDash()"></div>
    <div id="dash-modal">
        <h3>Teacher Dashboard</h3>
        <p>Vocabulary (comma separated):</p>
        <textarea id="vocab-list" style="width:100%; height:80px;">APPLE, BANANA, ORANGE, DRAGON, SCHOOL, HAPPY, SUMMER, KITTEN</textarea>
        <br><br>
        <button class="btn" style="min-width:100px; font-size:1.2rem;" onclick="saveDash()">SAVE & UPDATE</button>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyAeW720p-jxvUKu4wGjltbV-7PzXXH2Lv8",
            authDomain: "tournament-64337.firebaseapp.com",
            databaseURL: "https://tournament-64337-default-rtdb.firebaseio.com",
            projectId: "tournament-64337",
            storageBucket: "tournament-64337.firebasestorage.app",
            messagingSenderId: "1001808716448",
            appId: "1:1001808716448:web:d2c23c00b78faebd329fc5"
        };

        let db, role, myTeamId;
        let localState = { status: "waiting", currentWord: "", bracket: {} };
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(f, d) {
            const o = audio.createOscillator();
            const g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
            o.start(); o.stop(audio.currentTime + d);
        }

        function initApp(r) {
            role = r;
            if (!firebase.apps.length) firebase.initializeApp(fbConfig);
            db = firebase.database();
            document.getElementById('dot-net').style.background = "#4CAF50";

            db.ref('smart_tournament').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    localState = data;
                    document.getElementById('dot-sync').style.background = "#2196F3";
                    setTimeout(() => document.getElementById('dot-sync').style.background = "#ccc", 500);
                    refreshUI();
                } else if (role === 'host') {
                    resetTournament();
                }
            });

            if (role === 'player') {
                renderTeamSelection();
                navigate('screen-setup');
            } else {
                navigate('screen-host');
            }
        }

        function resetTournament() {
            const teams = [1,2,3,4,5,6].sort(() => Math.random() - 0.5);
            const bracket = {
                r1: [ {t1: teams[0], t2: teams[1], win: null}, {t1: teams[2], t2: teams[3], win: null}, {t1: teams[4], t2: teams[5], win: null} ],
                r2: [ {t1: null, t2: null, win: null} ],
                r3: [ {t1: null, t2: null, win: null} ]
            };
            db.ref('smart_tournament').set({
                status: "waiting",
                currentWord: "",
                vocab: document.getElementById('vocab-list').value.split(',').map(x => x.trim().toUpperCase()),
                bracket: bracket
            });
        }

        function triggerNextRace() {
            const word = localState.vocab[Math.floor(Math.random() * localState.vocab.length)];
            db.ref('smart_tournament').update({ status: "playing", currentWord: word });
        }

        function refreshUI() {
            if (role === 'host') {
                renderHostBracket();
            } else if (role === 'player' && myTeamId) {
                const activeMatch = findCurrentMatch();
                if (localState.status === "playing" && activeMatch && !activeMatch.win) {
                    startMiniGame();
                    navigate('screen-play');
                } else {
                    updateWaitingText(activeMatch);
                    navigate('screen-wait');
                }
            }
        }

        function findCurrentMatch() {
            const b = localState.bracket;
            // Reverse search: Check Finals, then Semis, then Round 1
            if (b.r3[0].t1 == myTeamId || b.r3[0].t2 == myTeamId) return b.r3[0];
            if (b.r2[0].t1 == myTeamId || b.r2[0].t2 == myTeamId) return b.r2[0];
            return b.r1.find(m => m.t1 == myTeamId || m.t2 == myTeamId);
        }

        function updateWaitingText(match) {
            const info = document.getElementById('match-info');
            if (localState.status === "finished") {
                document.getElementById('wait-msg').innerText = "Game Over!";
                info.innerText = "Check the leaderboard on the Smartboard.";
            } else if (match && match.win) {
                document.getElementById('wait-msg').innerText = (match.win == myTeamId) ? "ROUND WON! 🏆" : "ROUND LOST 💨";
                info.innerText = "Waiting for the next round to be generated...";
            } else {
                document.getElementById('wait-msg').innerText = "Wait for Teacher...";
                info.innerText = "The race will start automatically when it is your turn.";
            }
        }

        function startMiniGame() {
            const word = localState.currentWord;
            const slots = document.getElementById('word-slots');
            const sea = document.getElementById('letter-sea');
            slots.innerHTML = ''; sea.innerHTML = '';
            let progress = 0;

            document.getElementById('play-team-label').innerText = "TEAM " + myTeamId + " - Spell: " + word;

            word.split('').forEach(() => {
                const s = document.createElement('div');
                s.className = 'slot';
                slots.appendChild(s);
            });

            const letters = (word + "XYZ").split('').sort(() => Math.random() - 0.5);
            letters.forEach(char => {
                const b = document.createElement('div');
                b.className = 'bubble';
                b.innerText = char;
                b.style.left = (5 + Math.random() * 80) + '%';
                b.style.top = (5 + Math.random() * 80) + '%';
                
                b.onclick = () => {
                    if (char === word[progress]) {
                        playTone(400 + (progress * 100), 0.1);
                        slots.children[progress].innerText = char;
                        b.remove();
                        progress++;
                        if (progress === word.length) handleVictory();
                    } else {
                        playTone(150, 0.2);
                        b.style.background = "var(--danger)";
                        setTimeout(() => b.style.background = "var(--accent)", 400);
                    }
                };
                sea.appendChild(b);
            });
        }

        function handleVictory() {
            playTone(800, 0.5);
            let b = localState.bracket;
            let winnerId = myTeamId;

            // Determine which match we won and move up
            for (let i = 0; i < 3; i++) {
                if ((b.r1[i].t1 == winnerId || b.r1[i].t2 == winnerId) && !b.r1[i].win) {
                    b.r1[i].win = winnerId;
                    if (i === 0) b.r2[0].t1 = winnerId;
                    if (i === 1) b.r2[0].t2 = winnerId;
                    if (i === 2) b.r3[0].t1 = winnerId; // Bye to finals
                    db.ref('smart_tournament/bracket').set(b);
                    db.ref('smart_tournament/status').set("waiting");
                    return;
                }
            }

            if ((b.r2[0].t1 == winnerId || b.r2[0].t2 == winnerId) && !b.r2[0].win) {
                b.r2[0].win = winnerId;
                b.r3[0].t2 = winnerId;
                db.ref('smart_tournament/bracket').set(b);
                db.ref('smart_tournament/status').set("waiting");
                return;
            }

            if ((b.r3[0].t1 == winnerId || b.r3[0].t2 == winnerId) && !b.r3[0].win) {
                b.r3[0].win = winnerId;
                db.ref('smart_tournament/bracket').set(b);
                db.ref('smart_tournament/status').set("finished");
            }
        }

        function renderHostBracket() {
            const r1 = document.getElementById('col-r1');
            const r2 = document.getElementById('col-r2');
            const r3 = document.getElementById('col-r3');
            r1.innerHTML = '<h3>Qualifying</h3>';
            r2.innerHTML = '<h3>Semi-Final</h3>';
            r3.innerHTML = '<h3>Final</h3>';

            localState.bracket.r1.forEach(m => r1.appendChild(createMatchEl(m)));
            r2.appendChild(createMatchEl(localState.bracket.r2[0]));
            r3.appendChild(createMatchEl(localState.bracket.r3[0]));
        }

        function createMatchEl(m) {
            const card = document.createElement('div');
            card.className = "match-card";
            if (localState.status === "playing" && m.t1 && m.t2 && !m.win) card.classList.add('match-active');
            card.innerHTML = `
                <div class="team-row ${m.win == m.t1 ? 'winner' : ''}">${m.t1 ? 'Team '+m.t1 : '---'}</div>
                <div class="team-row ${m.win == m.t2 ? 'winner' : ''}">${m.t2 ? 'Team '+m.t2 : '---'}</div>
            `;
            return card;
        }

        function renderTeamSelection() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = '';
            for(let i=1; i<=6; i++) {
                const b = document.createElement('button');
                b.className = 'btn'; b.style.minWidth = '80px';
                b.innerText = "T" + i;
                b.onclick = () => { myTeamId = i; refreshUI(); };
                grid.appendChild(b);
            }
        }

        function navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleDash() {
            const m = document.getElementById('dash-modal');
            const o = document.getElementById('overlay');
            const s = m.style.display === 'block';
            m.style.display = s ? 'none' : 'block';
            o.style.display = s ? 'none' : 'block';
        }

        function saveDash() {
            const v = document.getElementById('vocab-list').value.split(',').map(x => x.trim().toUpperCase());
            db.ref('smart_tournament/vocab').set(v);
            toggleDash();
        }

        function manualSync() {
            db.ref('smart_tournament').get().then(snap => {
                if (snap.exists()) { localState = snap.val(); refreshUI(); }
            });
        }
    </script>
</body>
</html>
